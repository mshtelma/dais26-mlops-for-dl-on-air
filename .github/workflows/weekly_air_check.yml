name: Weekly AIR Availability Check

on:
  schedule:
    - cron: "0 9 * * 1"  # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-air:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sudo sh

      - name: Check AIR availability with state tracking
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          set -e
          STATE_FILE=".air-availability-state.json"

          # Try to read previous state from gh-pages branch
          git fetch origin gh-pages:gh-pages 2>/dev/null || git checkout --orphan gh-pages 2>/dev/null || true
          git checkout gh-pages -- $STATE_FILE 2>/dev/null || echo '{"consecutive_missing": 0, "last_check": ""}' > $STATE_FILE

          PREVIOUS_MISSING=$(jq -r '.consecutive_missing // 0' $STATE_FILE)
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Case-insensitive regex match for AIR (NOT jq contains())
          AIR_COUNT=$(databricks clusters spark-versions --output json \
            | jq '[.[] | select(.key | test("ai[-_]?runtime"; "i"))] | length')

          if [ "$AIR_COUNT" -eq 0 ]; then
            NEW_MISSING=$((PREVIOUS_MISSING + 1))
            echo "{\"consecutive_missing\": $NEW_MISSING, \"last_check\": \"$NOW\", \"air_count\": 0}" > $STATE_FILE
            echo "::warning::AIR not found. Consecutive missing: $NEW_MISSING"
            if [ "$NEW_MISSING" -ge 7 ]; then
              echo "::error::AIR missing for $NEW_MISSING consecutive days. PIVOT to dev_non_air target."
              # Continue (don't exit 1) so the state file still gets persisted
            fi
          else
            echo "{\"consecutive_missing\": 0, \"last_check\": \"$NOW\", \"air_count\": $AIR_COUNT}" > $STATE_FILE
            echo "AIR available: $AIR_COUNT versions found"
          fi

          # Persist state to gh-pages
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add $STATE_FILE
          git commit -m "Update AIR availability state: $NOW" || echo "No changes to commit"
          git push origin gh-pages || echo "::warning::Could not push state to gh-pages (best effort)"

          # Exit non-zero only if 7+ consecutive missing
          if [ "$NEW_MISSING" -ge 7 ] 2>/dev/null; then
            exit 1
          fi

  cradio-sha-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: pip install torch transformers huggingface-hub

      - name: Verify C-RADIOv4 pinned SHA still loads
        env:
          CRADIO_SHA: ${{ vars.CRADIO_COMMIT_SHA }}
        run: |
          python3 -c "
          import os, torch
          from transformers import AutoModel
          sha = os.environ.get('CRADIO_SHA', 'main')
          model = AutoModel.from_pretrained(
              'nvidia/C-RADIOv4-SO400M',
              trust_remote_code=True,
              revision=sha,
          )
          model.eval()
          with torch.no_grad():
              out = model(torch.randn(1, 3, 224, 224))
          if isinstance(out, tuple):
              summary, spatial = out
          elif hasattr(out, 'summary') and hasattr(out, 'features'):
              summary, spatial = out.summary, out.features
          else:
              raise RuntimeError(f'Unexpected output: {type(out)}')
          assert summary.shape == (1, 1152), f'summary shape: {summary.shape}'
          assert spatial.shape[-1] == 1536, f'spatial dim: {spatial.shape[-1]}'
          print(f'C-RADIOv4 SHA {sha} loads correctly. summary={summary.shape}, spatial={spatial.shape}')
          "
