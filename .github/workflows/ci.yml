name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/

      - name: Run unit tests
        run: python3 -m pytest tests/unit/ -q --tb=short

  build-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Build wheel
        run: uv build

      - name: Verify wheel exists
        run: ls dist/*.whl

      - name: Smoke test wheel install and import in clean env
        run: |
          python3 -m venv /tmp/wheel_test
          /tmp/wheel_test/bin/pip install dist/*.whl
          /tmp/wheel_test/bin/python -c "import dais26_dentex; print(dais26_dentex.__version__)"

  dab-validate:
    runs-on: ubuntu-latest
    continue-on-error: true
    # OAuth M2M auth via the `ci` GitHub Environment (scopes the SP secret; must
    # NOT have required reviewers — CI runs unattended). Fork PRs can't read
    # environment secrets, so this job no-ops there (it is continue-on-error).
    # See docs/RUNBOOK.md#cicd-oauth-m2m.
    environment: ci
    env:
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle (dev target)
        run: databricks bundle validate -t dev
