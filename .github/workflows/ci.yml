name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/

      - name: Run unit tests
        run: python3 -m pytest tests/unit/ -q --tb=short

  build-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Build wheel
        run: uv build

      - name: Verify wheel exists
        run: ls dist/*.whl

      - name: Smoke test wheel install and import in clean env
        run: |
          python3 -m venv /tmp/wheel_test
          /tmp/wheel_test/bin/pip install dist/*.whl
          /tmp/wheel_test/bin/python -c "import dais26_dentex; print(dais26_dentex.__version__)"

  # NOTE: `databricks bundle validate` is intentionally NOT run in CI. The target
  # workspace enforces an IP access list that blocks GitHub-hosted runner IPs
  # (403), and validate must contact the workspace. Validate locally before
  # pushing: `databricks bundle validate -t dev`.
