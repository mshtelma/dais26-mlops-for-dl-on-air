name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/

      - name: Run unit tests
        run: python3 -m pytest tests/unit/ -q --tb=short

  build-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Build wheel
        run: uv build

      - name: Verify wheel exists
        run: ls dist/*.whl

      - name: Smoke test wheel install and import in clean env
        run: |
          python3 -m venv /tmp/wheel_test
          /tmp/wheel_test/bin/pip install dist/*.whl
          /tmp/wheel_test/bin/python -c "import src; print(src.__version__)"

  dab-validate:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sudo sh

      - name: Validate bundle (dev_non_air target)
        run: databricks bundle validate -t dev_non_air
