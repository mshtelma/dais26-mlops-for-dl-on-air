experiment_name: /Shared/dais26/detector-train
run_name: cradio-v4-so400m-detector

environment:
  dependencies: requirements.yaml
  env_variables:
    NCCL_DEBUG: "INFO"
    PYTHONUNBUFFERED: "1"
    TORCH_DISTRIBUTED_DEBUG: "INFO"
    OMP_NUM_THREADS: "1"
  # Uncomment when switching backbone to gated DINOv3:
  # env_variables_secrets:
  #   HF_TOKEN: "dais26-secrets/hf-token"

compute:
  gpus: 8                          # 1 node (h100 = 8 GPUs/node); set 16 for 2-node scaling
  gpu_type: h100

max_retries: 1
timeout_minutes: 180

code_source:
  type: snapshot
  snapshot:
    repo_path: ..                  # YAML lives in sgcli/ ; the repo root is one level up
    git_branch: main               # uses local HEAD of main, no remote fetch
    # For reproducible release runs, pin instead:
    # git_commit: <40-char SHA>

parameters:                        # written by sgcli to $HYPERPARAMETERS_PATH
  catalog: dais26
  schema: vfm
  backbone_name: cradio_v4_so400m  # internal literal (NOT the HF id)
  backbone_revision: null
  volume_path: /Volumes/dais26/vfm/dentex_raw
  cache_dir: /Volumes/dais26/vfm/model_cache
  epochs: 10
  lr: 0.001
  batch_size: 8
  num_workers: 4
  use_lora: false
  lora_rank: 8
  lora_alpha: 32.0
  img_size: 1024
  model_name: cradio_detector
  register_model: true
  set_candidate_alias: true

command: |-
  set -euxo pipefail
  REPO_DIR="$HOME/dais26-mlops-for-dl-on-air"
  if [ ! -f "$REPO_DIR/pyproject.toml" ]; then
    REPO_DIR="$(find "$HOME" -maxdepth 2 -name pyproject.toml -printf '%h\n' 2>/dev/null | head -1)"
  fi
  cd "$REPO_DIR"
  pip install -e .
  GPUS_PER_NODE=8
  NNODES=$(( WORLD_SIZE / GPUS_PER_NODE ))
  [ "$NNODES" -lt 1 ] && NNODES=1
  torchrun \
    --nnodes=$NNODES \
    --nproc_per_node=$GPUS_PER_NODE \
    --node_rank=$NODE_RANK \
    --master_addr=$MASTER_ADDR \
    --master_port=$MASTER_PORT \
    -m src.train.cli
