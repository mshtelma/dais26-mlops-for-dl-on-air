# AIR CLI (air) workload — C-RADIOv4 detector training. Schema: air v0.1.0
# (`air config -h` for the field reference).
experiment_name: dais26-mlops-for-dl-on-air
mlflow_run_name: dais26-mlopsfordl-cradio-v4-so400m-detector

environment:
  dependencies: requirements.yaml

env_variables:
  NCCL_DEBUG: "INFO"
  PYTHONUNBUFFERED: "1"
  TORCH_DISTRIBUTED_DEBUG: "INFO"
  OMP_NUM_THREADS: "1"
  # Disable hf_transfer (the parallel chunked downloader). On AIR + UC Volume
  # cache_dir (FUSE), parallel writes fail with "Io: Input/output error (os
  # error 5) (no permits available)" / "Io: Operation not supported (os error
  # 95)". Set at process-env level so it's in place BEFORE Python imports
  # huggingface_hub.constants (which caches the value once at import time).
  # Falls back to the streaming downloader, which works on FUSE.
  HF_HUB_ENABLE_HF_TRANSFER: "0"
  HF_HUB_DOWNLOAD_TIMEOUT: "600"
# Uncomment when switching backbone to gated DINOv3:
# secrets:
#   HF_TOKEN: "dais26-secrets/hf-token"

compute:
  num_accelerators: 8              # 1 node (GPU_8xH100 = 8/node); 16 for 2-node scaling
  accelerator_type: GPU_8xH100

max_retries: 1
# 8h: full backbone fine-tune + longer schedules (and multi-trial sweeps that
# reuse this workload) must not be killed mid-run on the 8xH100 task.
timeout_minutes: 480

code_source:
  type: snapshot
  snapshot:
    root_path: ..                  # repo root (paths resolve relative to this YAML file)
    # Default packaging is the working tree as-is (staged + unstaged changes
    # included, .gitignore respected) so iterative local edits ship without a
    # commit. For a reproducible release run, pin a committed ref instead:
    # git:
    #   commit: <40-char SHA>      # XOR `branch: <name>` (local HEAD of branch)

# Two names carry everything that used to be a dozen hand-mirrored keys:
#   recipe — hyperparameters     (config.recipes.RECIPES)
#   env    — UC locations        (config.environments.ENVIRONMENTS: catalog /
#            schema / volume_path / cache_dir / experiment_name)
# Both are the SAME sources the notebook quickstart resolves, so the two launch
# surfaces cannot drift. `env` pins the TRAINING run into the shared
# dais26_vfm_experiment the sweep / deployment-job gates read (distinct from the
# workload's own top-level `experiment_name`). Everything else here is a
# deliberate override. Override at submit time without editing this file:
#   air run -f air/workload_train_detector.yaml -p df1 \
#     --override parameters.env=prod parameters.epochs=150
# (or override one value: `--override parameters.schema=my_sandbox`.)
parameters:                        # written by air to $HYPERPARAMETERS_PATH
  recipe: cradio_v4_so400m         # config.recipes literal, NOT the HF id
  env: df1                         # config.environments entry
  backbone_revision: main          # pin a 40-char SHA for reproducible runs
  register_model: true
  set_candidate_alias: true
  # Demo-time override: the recipe's full schedule is 150 epochs (the
  # dazzling-mole-850 0.5931 run); 50 keeps the quickstart inside ~2h.
  epochs: 50

command: |-
  set -euxo pipefail
  cd "$CODE_SOURCE_PATH"
  pip install .
  torchrun \
    --nnodes=$NUM_NODES \
    --nproc_per_node=$LOCAL_WORLD_SIZE \
    --node_rank=$NODE_RANK \
    --master_addr=$MASTER_ADDR \
    --master_port=$MASTER_PORT \
    -m dais26_dentex.train.cli
