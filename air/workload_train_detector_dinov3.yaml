# AIR CLI (air) workload — DINOv3 detector training (gated HF backbone).
# Schema: air v0.1.0 (`air config -h` for the field reference).
experiment_name: dais26-mlops-for-dl-on-air
mlflow_run_name: dais26-mlopsfordl-dinov3-vitl16-detector

environment:
  dependencies: requirements.yaml

env_variables:
  NCCL_DEBUG: "INFO"
  PYTHONUNBUFFERED: "1"
  TORCH_DISTRIBUTED_DEBUG: "INFO"
  OMP_NUM_THREADS: "1"
  # Disable hf_transfer (the parallel chunked downloader). On AIR + UC Volume
  # cache_dir (FUSE), parallel writes fail with "Io: Input/output error (os
  # error 5) (no permits available)" / "Io: Operation not supported (os error
  # 95)". Set at process-env level so it's in place BEFORE Python imports
  # huggingface_hub.constants (which caches the value once at import time).
  # Falls back to the streaming downloader, which works on FUSE.
  HF_HUB_ENABLE_HF_TRANSFER: "0"
  HF_HUB_DOWNLOAD_TIMEOUT: "600"
# DINOv3 is a gated HF model — inject the token from the secret scope so the
# AIR GPU workers can authenticate the backbone download. load_backbone reads
# os.environ.get("HF_TOKEN"). Create the scope/secret first (see docs):
#   databricks secrets create-scope dais26-secrets
#   databricks secrets put-secret dais26-secrets hf-token
secrets:
  HF_TOKEN: "dais26-secrets/hf-token"

compute:
  num_accelerators: 8              # 1 node (GPU_8xH100 = 8/node); 16 for 2-node scaling
  accelerator_type: GPU_8xH100

max_retries: 1
# 8h: full backbone fine-tune + longer schedules (and multi-trial sweeps that
# reuse this workload) must not be killed mid-run on the 8xH100 task.
timeout_minutes: 480

code_source:
  type: snapshot
  snapshot:
    root_path: ..                  # repo root (paths resolve relative to this YAML file)
    # Default packaging is the working tree as-is (staged + unstaged changes
    # included, .gitignore respected) so iterative local edits ship without a
    # commit. For a reproducible release run, pin a committed ref instead:
    # git:
    #   commit: <40-char SHA>      # XOR `branch: <name>` (local HEAD of branch)

# Hyperparameters come from the named recipe — `dinov3_vitl16` resolves to the
# dinov3_final campaign winner (capricious-hound-240, val mAP@50 0.5738):
# multi-layer fusion [6,12,18,24], 1280px, fp32 via amp "auto", batch 2 +
# grad-accum 2. Same source as the notebook quickstart, so the lanes cannot
# drift. Override at submit time, e.g.:
#   air run -f air/workload_train_detector_dinov3.yaml -p df1 \
#     --override parameters.epochs=150
parameters:                        # written by air to $HYPERPARAMETERS_PATH
  recipe: dinov3_vitl16            # config.recipes literal, NOT the HF id
  catalog: mlops_pj
  schema: dais26_vfm
  backbone_revision: main          # pin a 40-char SHA for reproducible runs
  volume_path: /Volumes/mlops_pj/dais26_vfm/dentex_raw
  cache_dir: /Volumes/mlops_pj/dais26_vfm/model_cache
  # MLflow experiment the TRAINING RUN logs to — must match the bundle-managed
  # experiment the notebook lane uses, or the sweep / deployment-job
  # best-in-experiment gates will not see air-trained versions. This is
  # deliberately distinct from the workload's top-level `experiment_name`
  # (the AIR CLI's own run tracking). Override per user via
  # `--override parameters.experiment_name=...`.
  experiment_name: /Users/michael.shtelma@databricks.com/dais26_vfm_experiment
  register_model: true
  set_candidate_alias: true
  # Demo-time override: the recipe's full schedule is 150 epochs; 50 keeps the
  # quickstart inside demo wall-time (fp32 @1280px is the slow path).
  epochs: 50

command: |-
  set -euxo pipefail
  cd "$CODE_SOURCE_PATH"
  pip install .
  torchrun \
    --nnodes=$NUM_NODES \
    --nproc_per_node=$LOCAL_WORLD_SIZE \
    --node_rank=$NODE_RANK \
    --master_addr=$MASTER_ADDR \
    --master_port=$MASTER_PORT \
    -m dais26_dentex.train.cli
