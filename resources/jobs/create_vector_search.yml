resources:
  jobs:
    create_vector_search:
      name: "dais26_create_vector_search_${bundle.target}"
      description: "Create the Vector Search endpoint (dais26-vfm-vs) + DELTA_SYNC index over the precomputed embeddings table, trigger an initial sync, wait ONLINE, and run a smoke-test similarity query. Runs 04b_create_vector_search.py. No GPU — Vector Search compute is managed by the VS endpoint; the notebook just drives the SDK + reads the embeddings table for the dimension/smoke test."
      tags:
        project: "dais26-vfm"
        component: "vector-search"
      timeout_seconds: 3300

      environments:
        - environment_key: "default"
          spec:
            environment_version: "3"
            dependencies:
              - "../../dist/*.whl"

      tasks:
        - task_key: "create_vector_search"
          notebook_task:
            notebook_path: "../../notebooks/04b_create_vector_search.py"
          environment_key: "default"
