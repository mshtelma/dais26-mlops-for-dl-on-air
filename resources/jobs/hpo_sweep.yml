resources:
  jobs:
    hpo_sweep:
      name: "dais26_hpo_sweep_${bundle.target}"
      description: "Detector HPO sweep: sequential @distributed AIR trials (nested MLflow runs), then retrain + register the winner @candidate. See notebooks/02b_hpo_sweep.py."
      tags:
        project: "dais26-vfm"
        component: "training"
      # TEMP: raised from 8h -> 48h for this run. The sweep runs SWEEP_MAX_TRIALS
      # sequential ~25-epoch 8xH100 trials plus a 50-epoch retrain of the winner;
      # @distributed inherits this job timeout, so the cap lives here.
      timeout_seconds: 172800
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED

      # Mirrors train_detector.yml: the sweep notebook drives @distributed on the
      # GPU task allocation; each trial reuses the same 8xH100 sequentially. All
      # sweep config (strategy / trials / search space) lives in notebooks/00_config.py
      # under SWEEP_* and is pulled in via `%run ./00_config`.
      environments:
        - environment_key: "default"
          spec:
            environment_version: "3"
            dependencies:
              - "../../dist/*.whl"
        - environment_key: "gpu"
          spec:
            base_environment: databricks_ai_v5
            dependencies:
              - "../../dist/*.whl"

      tasks:
        - task_key: "setup"
          notebook_task:
            notebook_path: "../../notebooks/00_setup.py"
          environment_key: "default"
          max_retries: 1

        - task_key: "sweep"
          depends_on:
            - task_key: "setup"
          notebook_task:
            notebook_path: "../../notebooks/02b_hpo_sweep.py"
          environment_key: "gpu"
          compute:
            hardware_accelerator: GPU_8xH100
          max_retries: 1

        - task_key: "deploy_endpoint"
          depends_on:
            - task_key: "sweep"
          notebook_task:
            notebook_path: "../../notebooks/04_deploy_serving.py"
          environment_key: "default"
          max_retries: 1
