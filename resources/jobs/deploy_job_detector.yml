resources:
  jobs:
    deploy_job_detector:
      name: "dais26_deploy_job_detector_${bundle.target}"
      description: "MLflow 3 deployment job for the dev detector models. A new @challenger version auto-triggers Evaluation (COCO eval on the DENTEX test split + thresholds + best-in-experiment gate) -> Approval (human sets UC tag Approval_Check=Approved) -> Promote (lineage-preserving copy dev->prod/champion schema, set @champion, deploy + smoke test). Connect it to the dev models via resources/jobs/connect_deployment_job.yml + notebooks/13."
      tags:
        project: "dais26-vfm"
        component: "deployment-job"

      # Deployment jobs run one version at a time; serialize so two challengers
      # don't race the same endpoint / champion alias.
      max_concurrent_runs: 1

      # GPU queue wait + databricks_ai_v5 cold-start + ViT backbone load before
      # the 250-image test eval even starts (mirrors eval_comparison.yml).
      timeout_seconds: 7200

      queue:
        enabled: true

      # Job-level parameters the MLflow deployment-job framework injects when a new
      # version triggers the run. They propagate to every notebook task as widgets
      # (read via dbutils.widgets.get in 10/11/12). model_name is the full dev UC
      # name; model_version is the numeric version that got @challenger.
      parameters:
        - name: model_name
          default: ""
        - name: model_version
          default: ""

      # run_as is inherited from the bundle target: current user on dev (mode:
      # development), var.sp_app_id on prod (databricks.yml prod target run_as).
      # The deployment job triggers with the model owner's credentials, so the
      # owner must be able to write the prod/champion schema (granted in 00_setup).

      environments:
        # Serverless CPU for Approval + Promote (driver-only; the endpoint uses
        # GPU serving compute). Wheel attached via the serverless environments
        # block (serverless tasks reject the task-level `libraries` field).
        - environment_key: "default"
          spec:
            environment_version: "3"
            dependencies:
              - "../../dist/*.whl"
        # Single serverless GPU for the test-split eval. base_environment
        # databricks_ai_v5 is the serverless-GPU base (mirrors eval_comparison).
        # NOTE: no environment_version on GPU envs — base_environment selects it.
        - environment_key: "gpu"
          spec:
            base_environment: databricks_ai_v5
            dependencies:
              - "../../dist/*.whl"

      tasks:
        - task_key: "Evaluation"
          notebook_task:
            notebook_path: "../../notebooks/10_deploy_eval_task.py"
          environment_key: "gpu"
          compute:
            # CLI enum accepts GPU_1xA10 / GPU_8xH100; A10 is plenty for 250
            # frozen-backbone forward passes.
            hardware_accelerator: GPU_1xA10
          max_retries: 1

        - task_key: "Approval"
          depends_on:
            - task_key: "Evaluation"
          notebook_task:
            notebook_path: "../../notebooks/11_deploy_approval_task.py"
          environment_key: "default"
          # Human-in-the-loop gate: fail fast on the first run (no retries) and
          # wait for a human to set Approval_Check=Approved + repair-run.
          max_retries: 0

        - task_key: "Promote"
          depends_on:
            - task_key: "Approval"
          notebook_task:
            notebook_path: "../../notebooks/12_promote_task.py"
          environment_key: "default"
          max_retries: 0
