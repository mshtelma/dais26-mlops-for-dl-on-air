resources:
  jobs:
    connect_deployment_job:
      name: "dais26_connect_deployment_job_${bundle.target}"
      description: "One-shot post-deploy wiring: resolve the deploy_job_detector job id and update_registered_model(deployment_job_id=...) for both dev detector models (cradio_detector, dinov3_detector) so a new @challenger version auto-triggers the deployment job. Run once after `databricks bundle deploy` (and again if the deploy job is recreated). Runs notebooks/13."
      tags:
        project: "dais26-vfm"
        component: "deployment-job"

      timeout_seconds: 600

      # The deployment job's id, resolved by DAB from the sibling job resource and
      # forwarded to the notebook as a widget. No name lookup needed.
      parameters:
        - name: deployment_job_id
          default: "${resources.jobs.deploy_job_detector.id}"

      environments:
        - environment_key: "default"
          spec:
            environment_version: "3"
            dependencies:
              - "../../dist/*.whl"

      tasks:
        - task_key: "connect_deployment_job"
          notebook_task:
            notebook_path: "../../notebooks/13_connect_deployment_job.py"
          environment_key: "default"
